<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Macro Trader Plan</title>
<meta name="theme-color" content="#0f172a" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MacroPlan" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  header {
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
    border-bottom: 1px solid #1e293b;
  }
  #app { padding: 12px; max-width: 480px; margin: 0 auto; }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .meta { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  h2 { margin: 4px 0 12px; font-size: 20px; }
  h3 { font-size: 15px; margin: 16px 0 6px; }
  ul.tasklist { padding-left: 18px; }
  ul.tasklist li { margin-bottom: 8px; }
  .checkrow { display: flex; align-items: center; gap: 8px; margin: 16px 0; font-size: 15px; }
  .checkrow input { width: 20px; height: 20px; }
  textarea {
    width: 100%; min-height: 80px; border-radius: 8px; border: 1px solid #334155;
    background: #0f172a; color: #e2e8f0; padding: 8px; font-size: 14px; resize: vertical;
  }
  .streak { margin-top: 14px; font-size: 14px; color: #fbbf24; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: #1e293b; color: #94a3b8; font-size: 14px;
  }
  .tab.active { background: #334155; color: #fff; }
  input[type="date"] {
    width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155;
    background: #0f172a; color: #e2e8f0;
  }
  button#setStartBtn, button#resetBtn, button#resetBtn2 {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: #3b82f6; color: white; font-size: 15px; margin-top: 8px;
  }
  .progressbar { width: 100%; height: 14px; background: #0f172a; border-radius: 7px; overflow: hidden; margin: 10px 0; }
  .progressfill { height: 100%; background: #22c55e; }
  .weekday { margin-bottom: 14px; font-size: 14px; }
  .weekday ul { padding-left: 18px; margin: 4px 0; }
</style>
</head>
<body>
<header>📈 Macro Trader Plan — Year 1</header>
<div id="app"></div>
<script src="app-data.js"></script>
<script src="app.js"></script>
</body>
</html>
